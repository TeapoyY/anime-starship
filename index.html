<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interstellar Transit</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;700&display=swap" rel="stylesheet">
  <script src="https://esm.sh/animejs@3"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #030014; }
    body { font-family: 'Space Grotesk', sans-serif; }

    #universe {
      position: fixed; inset: 0;
      background: radial-gradient(ellipse at 30% 40%, #0a0020 0%, #030014 70%);
    }

    /* Nebula */
    .nebula {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.15;
      will-change: transform;
    }
    .nebula-1 {
      width: 600px; height: 400px;
      background: radial-gradient(circle, #7c3aed 0%, transparent 70%);
      top: 10%; left: 20%;
    }
    .nebula-2 {
      width: 500px; height: 350px;
      background: radial-gradient(circle, #00d4ff 0%, transparent 70%);
      top: 50%; right: 10%;
    }
    .nebula-3 {
      width: 450px; height: 300px;
      background: radial-gradient(circle, #f59e0b 0%, transparent 70%);
      bottom: 10%; left: 40%;
      opacity: 0.08;
    }

    /* Stars */
    .star {
      position: absolute;
      border-radius: 50%;
      will-change: transform, opacity;
    }

    /* Star streaks for warp */
    .streak {
      position: absolute;
      border-radius: 2px;
      will-change: transform, opacity;
      transform-origin: left center;
    }

    /* Starship */
    #starship-wrap {
      position: absolute;
      left: 50%; top: 50%;
      transform: translate(-50%, -50%);
      z-index: 10;
      cursor: pointer;
      opacity: 0;
    }
    #starship-wrap svg {
      overflow: visible;
      filter: drop-shadow(0 0 8px #00d4ff) drop-shadow(0 0 20px #00d4ff44);
    }

    /* Engine glow */
    .engine-glow {
      position: absolute;
      border-radius: 50%;
      background: radial-gradient(circle, #00d4ff 0%, #00d4ff00 70%);
      pointer-events: none;
    }

    /* Exhaust trail */
    .exhaust {
      position: absolute;
      border-radius: 50%;
      background: radial-gradient(ellipse, #00d4ff 0%, #7c3aed 40%, transparent 70%);
      pointer-events: none;
    }

    /* UI */
    #ui-title {
      position: fixed;
      bottom: 60px; left: 50%;
      transform: translateX(-50%);
      text-align: center;
      z-index: 20;
      pointer-events: none;
      opacity: 0;
    }
    #ui-title h1 {
      color: #fff;
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: 0.4em;
      text-shadow: 0 0 30px #00d4ff88;
    }
    #ui-title p {
      color: #a5c8ff;
      font-size: 0.75rem;
      letter-spacing: 0.3em;
      margin-top: 8px;
      font-weight: 300;
    }
    #status-bar {
      position: fixed;
      top: 30px; left: 50%;
      transform: translateX(-50%);
      color: #00d4ff;
      font-size: 0.7rem;
      letter-spacing: 0.35em;
      font-weight: 300;
      z-index: 20;
      opacity: 0;
      text-shadow: 0 0 10px #00d4ff;
    }

    /* Controls */
    #controls {
      position: fixed;
      bottom: 30px; right: 30px;
      display: flex; align-items: center; gap: 16px;
      z-index: 20;
      opacity: 0;
    }
    #controls button {
      background: none;
      border: 1px solid #00d4ff44;
      color: #00d4ff;
      width: 36px; height: 36px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 0.9rem;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s, border-color 0.2s;
    }
    #controls button:hover { background: #00d4ff22; border-color: #00d4ff; }
    #controls span {
      color: #a5c8ff;
      font-size: 0.65rem;
      letter-spacing: 0.15em;
    }
    #speed-slider {
      -webkit-appearance: none;
      width: 80px; height: 2px;
      background: #00d4ff33;
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }
    #speed-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px; height: 12px;
      border-radius: 50%;
      background: #00d4ff;
      cursor: pointer;
      box-shadow: 0 0 6px #00d4ff;
    }

    /* Burst flash */
    #burst {
      position: fixed; inset: 0;
      background: radial-gradient(circle at 50% 50%, #00d4ff22 0%, transparent 60%);
      pointer-events: none;
      z-index: 5;
      opacity: 0;
    }
  </style>
</head>
<body>
  <div id="universe"></div>
  <div id="burst"></div>

  <!-- Nebula -->
  <div class="nebula nebula-1"></div>
  <div class="nebula nebula-2"></div>
  <div class="nebula nebula-3"></div>

  <!-- Starship -->
  <div id="starship-wrap">
    <svg width="180" height="80" viewBox="-90 -40 180 80">
      <!-- Ship body -->
      <defs>
        <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="#0a0a1a"/>
          <stop offset="50%" stop-color="#12122a"/>
          <stop offset="100%" stop-color="#0a0a1a"/>
        </linearGradient>
        <linearGradient id="engineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="#00d4ff"/>
          <stop offset="100%" stop-color="#00d4ff00"/>
        </linearGradient>
        <filter id="glow">
          <feGaussianBlur stdDeviation="3" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <filter id="glowBig">
          <feGaussianBlur stdDeviation="6" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>

      <!-- Main hull -->
      <path d="M-80,0 Q-60,-18 0,-20 Q60,-18 80,0 Q60,18 0,20 Q-60,18 -80,0 Z"
            fill="url(#bodyGrad)" stroke="#1a1a3a" stroke-width="0.5"/>

      <!-- Cockpit glass -->
      <ellipse cx="30" cy="-5" rx="18" ry="8" fill="#00d4ff18" stroke="#00d4ff55" stroke-width="0.8"/>
      <ellipse cx="30" cy="-5" rx="10" ry="4" fill="#00d4ff10"/>

      <!-- Wing details left -->
      <path d="M-20,12 L-50,28 L-45,30 L-15,16 Z" fill="#0a0a1a" stroke="#1a1a3a" stroke-width="0.5"/>
      <path d="M-20,-12 L-50,-28 L-45,-30 L-15,-16 Z" fill="#0a0a1a" stroke="#1a1a3a" stroke-width="0.5"/>

      <!-- Engine pods -->
      <ellipse cx="-60" cy="-10" rx="12" ry="6" fill="#0a0a1a" stroke="#00d4ff55" stroke-width="0.8" filter="url(#glow)"/>
      <ellipse cx="-60" cy="10" rx="12" ry="6" fill="#0a0a1a" stroke="#00d4ff55" stroke-width="0.8" filter="url(#glow)"/>
      <ellipse cx="-72" cy="0" rx="14" ry="8" fill="#0a0a1a" stroke="#7c3aed77" stroke-width="0.8" filter="url(#glow)"/>

      <!-- Engine cores (bright) -->
      <ellipse cx="-62" cy="-10" rx="5" ry="3" fill="#00d4ff" filter="url(#glowBig)" opacity="0.9"/>
      <ellipse cx="-62" cy="10" rx="5" ry="3" fill="#00d4ff" filter="url(#glowBig)" opacity="0.9"/>
      <ellipse cx="-74" cy="0" rx="6" ry="4" fill="#7c3aed" filter="url(#glowBig)" opacity="0.8"/>

      <!-- Engine exhaust glow (animated) -->
      <ellipse cx="-78" cy="-10" rx="8" ry="4" fill="url(#engineGrad)" filter="url(#glowBig)" opacity="0.6"/>
      <ellipse cx="-78" cy="10" rx="8" ry="4" fill="url(#engineGrad)" filter="url(#glowBig)" opacity="0.6"/>
      <ellipse cx="-90" cy="0" rx="12" ry="6" fill="url(#engineGrad)" filter="url(#glowBig)" opacity="0.7"/>
    </svg>
  </div>

  <!-- Title -->
  <div id="ui-title">
    <h1>INTERSTELLAR TRANSIT</h1>
    <p>DEEP SPACE NAVIGATION SYSTEM v4.2</p>
  </div>

  <!-- Status -->
  <div id="status-bar">COASTING</div>

  <!-- Controls -->
  <div id="controls">
    <button id="play-btn">&#9654;</button>
    <span>Speed</span>
    <input type="range" id="speed-slider" min="0.5" max="3" step="0.1" value="1">
  </div>

  <script type="module">
    const { timeline } = anime;

    const state = {
      paused: false,
      speed: 1,
      warp: false,
      stars: [],
      streaks: []
    };

    const $ = id => document.getElementById(id);

    // ── Build star field ──────────────────────────────────────────────────
    function createStar(layer) {
      const el = document.createElement('div');
      el.className = 'star';
      const size = layer === 0 ? Math.random() * 1.5 + 0.5
                 : layer === 1 ? Math.random() * 2 + 1
                               : Math.random() * 3 + 2;
      const bright = layer === 2 ? '#ffffff' : layer === 1 ? '#a5c8ff' : '#6688aa';
      el.style.cssText = `
        width:${size}px; height:${size}px;
        background:${bright};
        left:${Math.random() * 100}vw;
        top:${Math.random() * 100}vh;
        opacity:${layer === 0 ? Math.random() * 0.3 + 0.1 : layer === 1 ? Math.random() * 0.5 + 0.2 : Math.random() * 0.8 + 0.2};
      `;
      $('universe').appendChild(el);
      return { el, layer, x: parseFloat(el.style.left), y: parseFloat(el.style.top), size, baseOpacity: parseFloat(el.style.opacity) };
    }

    const STAR_COUNTS = [80, 50, 30];
    for (let layer = 0; layer < 3; layer++) {
      for (let i = 0; i < STAR_COUNTS[layer]; i++) {
        state.stars.push(createStar(layer));
      }
    }

    // ── Animate stars ────────────────────────────────────────────────────
    function animateStars() {
      const speeds = [0.3, 0.8, 1.5];
      state.stars.forEach(star => {
        const spd = speeds[star.layer] * state.speed;
        star.y -= spd * 0.016;
        if (star.y < -2) {
          star.y = 102;
          star.x = Math.random() * 100;
        }
        star.el.style.transform = `translate(${star.x}vw, ${star.y}vh)`;

        // warp mode: stretch
        if (state.warp) {
          const stretch = state.speed * 8;
          star.el.style.opacity = star.baseOpacity * 0.7;
          star.el.style.transform = `translate(${star.x}vw, ${star.y}vh) scaleY(${stretch})`;
        } else {
          star.el.style.opacity = star.baseOpacity;
        }
      });
      requestAnimationFrame(animateStars);
    }
    requestAnimationFrame(animateStars);

    // ── Nebula drift ─────────────────────────────────────────────────────
    const nebulas = document.querySelectorAll('.nebula');
    anime({
      targets: '.nebula',
      translateX: () => anime.random(-60, 60),
      translateY: () => anime.random(-40, 40),
      duration: () => anime.random(20000, 30000),
      easing: 'easeInOutSine',
      direction: 'alternate',
      loop: true
    });

    // ── Ship entrance ────────────────────────────────────────────────────
    const shipWrap = $('starship-wrap');
    const tl = timeline({
      easing: 'easeOutExpo'
    });

    // Entry animation
    tl.add({
      targets: shipWrap,
      opacity: [0, 1],
      translateY: ['50%', '-50%'],
      duration: 2000
    });

    // Engine glow pulse
    tl.add({
      targets: '#starship-wrap svg ellipse',
      opacity: [0, (el) => el.tagName === 'ellipse' && el.getAttribute('fill')?.startsWith('#00') ? 0.9 : 0.6],
      duration: 800,
      update: (anim) => {
        const ship = $('starship-wrap');
        ship.style.filter = `drop-shadow(0 0 ${8 + Math.sin(anim.progress / 100 * Math.PI) * 12}px #00d4ff)`;
      }
    }, '-=800');

    // UI fade in
    tl.add({
      targets: '#ui-title',
      opacity: [0, 1],
      translateY: [20, 0],
      duration: 1000,
      easing: 'easeOutQuart'
    }, 500);

    tl.add({
      targets: '#status-bar',
      opacity: [0, 1],
      duration: 800
    }, 1500);

    tl.add({
      targets: '#controls',
      opacity: [0, 1],
      duration: 800
    }, 1800);

    // ── Ship hover float ──────────────────────────────────────────────────
    anime({
      targets: '#starship-wrap',
      translateY: '-50%',
      translateX: ['-50%', '-50%'],
      scaleY: [1, 1.02, 0.98, 1],
      duration: 4000,
      easing: 'easeInOutSine',
      loop: true,
      delay: 3000
    });

    // ── Ship tilt on move ─────────────────────────────────────────────────
    let mouseX = 0.5;
    document.addEventListener('mousemove', e => {
      mouseX = e.clientX / window.innerWidth;
      const tilt = (mouseX - 0.5) * 8;
      anime({
        targets: '#starship-wrap',
        rotateZ: tilt,
        duration: 800,
        easing: 'easeOutQuart'
      });
    });

    // ── Engine exhaust flicker ────────────────────────────────────────────
    function flickerExhaust() {
      anime({
        targets: '#starship-wrap svg ellipse[fill="#00d4ff"]',
        opacity: [0.6, 1, 0.4],
        duration: () => anime.random(100, 300),
        easing: 'easeInOutSine',
        loop: true
      });
    }
    flickerExhaust();

    // ── Warp mode ─────────────────────────────────────────────────────────
    function engageWarp() {
      state.warp = true;
      $('status-bar').textContent = 'WARP DRIVE ENGAGED';
      $('status-bar').style.color = '#f59e0b';
      $('status-bar').style.textShadow = '0 0 10px #f59e0b';

      anime({
        targets: '#starship-wrap svg ellipse[fill="#00d4ff"]',
        rx: [8, 14],
        duration: 600,
        easing: 'easeOutExpo'
      });

      // Stars get streaks
      anime({
        targets: '.star',
        scaleY: () => state.speed * 12,
        opacity: [null, 0.6],
        duration: 600,
        easing: 'easeOutExpo'
      });
    }

    function disengageWarp() {
      state.warp = false;
      $('status-bar').textContent = 'COASTING';
      $('status-bar').style.color = '#00d4ff';
      $('status-bar').style.textShadow = '0 0 10px #00d4ff';

      anime({
        targets: '#starship-wrap svg ellipse[fill="#00d4ff"]',
        rx: [14, 8],
        duration: 600,
        easing: 'easeInOutExpo'
      });

      anime({
        targets: '.star',
        scaleY: 1,
        opacity: null,
        duration: 600,
        easing: 'easeInOutExpo'
      });
    }

    // ── Burst on click ─────────────────────────────────────────────────────
    shipWrap.addEventListener('click', () => {
      const burst = $('burst');
      anime({
        targets: burst,
        opacity: [0, 1, 0],
        duration: 400,
        easing: 'easeOutQuad'
      });

      anime({
        targets: '#starship-wrap',
        scale: [1, 1.15, 1],
        duration: 500,
        easing: 'easeOutElastic(1, 0.6)'
      });

      if (!state.warp) engageWarp();
      setTimeout(() => disengageWarp(), 2000);
    });

    // ── Controls ───────────────────────────────────────────────────────────
    const playBtn = $('play-btn');
    const speedSlider = $('speed-slider');

    playBtn.addEventListener('click', () => {
      state.paused = !state.paused;
      if (state.paused) {
        anime.pause();
        playBtn.innerHTML = '&#9646;&#9646;';
      } else {
        anime.resume();
        playBtn.innerHTML = '&#9654;';
      }
    });

    speedSlider.addEventListener('input', e => {
      state.speed = parseFloat(e.target.value);
      if (state.speed > 1.5 && !state.warp) engageWarp();
      if (state.speed <= 1 && state.warp) disengageWarp();
    });

    document.addEventListener('keydown', e => {
      if (e.code === 'Space') {
        e.preventDefault();
        playBtn.click();
      }
    });

    // ── Auto warp after delay ──────────────────────────────────────────────
    setTimeout(engageWarp, 4000);
    setTimeout(disengageWarp, 8000);
    setTimeout(engageWarp, 14000);
    setTimeout(disengageWarp, 19000);
  </script>
</body>
</html>
